<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Corpsewood</title>
  <style>
    /* Full black background, center content */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: black;
      color: red;
      font-family: monospace;
      text-align: center;
    }

    /* Fullscreen image with fade-in and flicker effect */
    #splash-img {
      width: 100vw;
      height: 50vh;
      object-fit: cover;
      opacity: 0;
      animation: fadeIn 2s forwards, flicker 0.5s infinite;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 22%, 24%, 55% { opacity: 0.5; }
    }

    /* Warning text */
    #warning-text {
      margin-top: 20px;
      font-size: 1.5em;
      margin-bottom: 20px;
    }

    /* Code input box */
    #code-input {
      padding: 10px;
      font-size: 1em;
      border-radius: 5px 0 0 5px;
      border: 2px solid red;
      outline: none;
      background-color: black;
      color: red;
    }

    #submit-btn {
      padding: 10px 15px;
      font-size: 1em;
      border: 2px solid red;
      border-left: none;
      border-radius: 0 5px 5px 0;
      background-color: red;
      color: black;
      cursor: pointer;
    }

    #feedback {
      margin-top: 15px;
      font-size: 1.2em;
      color: red;
    }
  </style>
</head>
<body>
  <!-- Spooky image -->
  <img id="splash-img" src="jarv-tryckanpassad-120707-8426-sv-c.png" alt="Creepy Image">

  <!-- Warning text -->
  <div id="warning-text">you're not cleared for access for this area.</div>

  <!-- Code input -->
  <div id="code-area">
    <input type="text" id="code-input" placeholder="Enter code..." />
    <button id="submit-btn">Enter</button>
  </div>

  <!-- Feedback message -->
  <div id="feedback"></div>

  <script>
    const code = "fearful"; // Correct code
    const input = document.getElementById("code-input");
    const button = document.getElementById("submit-btn");
    const feedback = document.getElementById("feedback");

    function checkCode() {
      if(input.value.trim().toLowerCase() === code){
        feedback.textContent = "Access granted...";
        feedback.style.color = "lime";
        setTimeout(() => {
          window.location.href = "https://corpsewood.github.io/alert/";
        }, 1000);
      } else {
        feedback.textContent = "Incorrect code...";
        feedback.style.color = "red";
        input.value = "";
        input.focus();
      }
    }

    button.addEventListener("click", checkCode);
    input.addEventListener("keypress", function(e){
      if(e.key === "Enter") checkCode();
    });
  </script>
</body>
</html>
